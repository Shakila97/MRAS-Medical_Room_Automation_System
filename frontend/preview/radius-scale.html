<!doctype html>
<!-- @dsCard group="Brand" name="Radius scale" subtitle="sm 6 · md 10 · lg 16 · xl 24 · pill" viewport="700x180" -->
<html><head><meta charset="utf-8"><title>Radius scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px 20px; background: var(--surface-1); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box  { width: 100%; aspect-ratio: 1.4 / 1; background: var(--teal-100); border: 1px solid var(--teal-300); }
  .name { font: 500 11px var(--font-mono); color: var(--fg-2); }
  .px   { font: 400 11px var(--font-mono); color: var(--fg-3); }
</style></head>
<body>
  <div class="grid">
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="name">--radius-sm</div><div class="px">6 px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="name">--radius-md</div><div class="px">10 px · default</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="name">--radius-lg</div><div class="px">16 px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="name">--radius-xl</div><div class="px">24 px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-pill)"></div><div class="name">--radius-pill</div><div class="px">999 px</div></div>
  </div>
</body></html>

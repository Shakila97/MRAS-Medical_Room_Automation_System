<!doctype html>
<!-- @dsCard group="Brand" name="Neutral palette" subtitle="Slate 0–900, cool grey ramp" viewport="700x140" -->
<html><head><meta charset="utf-8"><title>Colors — Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 16px; background: var(--surface-1); }
  .row { display: grid; grid-template-columns: repeat(11, 1fr); gap: 6px; }
  .sw  { aspect-ratio: 1.4 / 1; border-radius: 8px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; font: 500 11px var(--font-mono); }
  .sw .name { font-size: 10px; opacity: .8; letter-spacing: .04em; text-transform: uppercase; }
  .label { font: 600 12px/1 var(--font-sans); color: var(--fg-3); letter-spacing: .06em; text-transform: uppercase; margin: 0 0 10px; }
</style></head>
<body>
  <p class="label">Slate · neutrals</p>
  <div class="row">
    <div class="sw" style="background:var(--slate-0);color:var(--fg-1);border:1px solid var(--border-1)"><span class="name">0</span>FFFFFF</div>
    <div class="sw" style="background:var(--slate-50);color:var(--fg-1);border:1px solid var(--border-1)"><span class="name">50</span>F8FAFC</div>
    <div class="sw" style="background:var(--slate-100);color:var(--fg-1)"><span class="name">100</span>F1F5F9</div>
    <div class="sw" style="background:var(--slate-200);color:var(--fg-1)"><span class="name">200</span>E2E8F0</div>
    <div class="sw" style="background:var(--slate-300);color:var(--fg-1)"><span class="name">300</span>CBD5E1</div>
    <div class="sw" style="background:var(--slate-400);color:var(--fg-1)"><span class="name">400</span>94A3B8</div>
    <div class="sw" style="background:var(--slate-500);color:#fff"><span class="name">500</span>64748B</div>
    <div class="sw" style="background:var(--slate-600);color:#fff"><span class="name">600</span>475569</div>
    <div class="sw" style="background:var(--slate-700);color:#fff"><span class="name">700</span>334155</div>
    <div class="sw" style="background:var(--slate-800);color:#fff"><span class="name">800</span>1E293B</div>
    <div class="sw" style="background:var(--slate-900);color:#fff"><span class="name">900</span>0F172A</div>
  </div>
</body></html>

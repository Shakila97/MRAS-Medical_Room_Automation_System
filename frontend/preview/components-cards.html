<!doctype html>
<!-- @dsCard group="Brand" name="Cards" subtitle="Default border · lifted · dense" viewport="700x160" -->
<html><head><meta charset="utf-8"><title>Card surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px; background: var(--bg-canvas); }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .card { background: var(--surface-1); border: 1px solid var(--border-1); border-radius: var(--radius-md); padding: 16px; }
  .card.lifted { box-shadow: var(--shadow-1); }
  .card .eb { font: 600 11px var(--font-sans); letter-spacing: .04em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 6px; }
  .card .t  { font: 600 16px var(--font-sans); color: var(--fg-1); margin-bottom: 6px; }
  .card .b  { font: 400 13px var(--font-sans); color: var(--fg-2); line-height: 1.4; }
  .card.dense { padding: 12px 14px; }
  .card.dense .t { font-size: 14px; margin-bottom: 2px; }
</style></head>
<body>
  <div class="grid">
    <div class="card"><div class="eb">Default · border only</div><div class="t">Patient overview</div><div class="b">No resting shadow. Border separates from canvas.</div></div>
    <div class="card lifted"><div class="eb">Lifted · shadow-1</div><div class="t">Dashboard widget</div><div class="b">Optional elevation for primary dashboard tiles.</div></div>
    <div class="card dense"><div class="eb">Dense</div><div class="t">Inventory row</div><div class="b">12 px padding in scrollable tables.</div></div>
  </div>
</body></html>

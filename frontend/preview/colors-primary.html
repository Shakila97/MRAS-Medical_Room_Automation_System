<!doctype html>
<!-- @dsCard group="Brand" name="Primary palette" subtitle="Teal 50–900 · 600 is primary" viewport="700x140" -->
<html><head><meta charset="utf-8"><title>Colors — Primary</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 16px; background: var(--surface-1); }
  .row { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; }
  .sw  { aspect-ratio: 1.6 / 1; border-radius: 8px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; color: white; font: 500 11px var(--font-mono); }
  .sw .name { font-size: 10px; opacity: .8; letter-spacing: .04em; text-transform: uppercase; }
  .label { font: 600 12px/1 var(--font-sans); color: var(--fg-3); letter-spacing: .06em; text-transform: uppercase; margin: 0 0 10px; }
</style></head>
<body>
  <p class="label">Teal · primary</p>
  <div class="row">
    <div class="sw" style="background:var(--teal-50);color:var(--fg-1)"><span class="name">50</span>F0FDFA</div>
    <div class="sw" style="background:var(--teal-100);color:var(--fg-1)"><span class="name">100</span>CCFBF1</div>
    <div class="sw" style="background:var(--teal-200);color:var(--fg-1)"><span class="name">200</span>99F6E4</div>
    <div class="sw" style="background:var(--teal-300);color:var(--fg-1)"><span class="name">300</span>5EEAD4</div>
    <div class="sw" style="background:var(--teal-400);color:var(--fg-1)"><span class="name">400</span>2DD4BF</div>
    <div class="sw" style="background:var(--teal-500)"><span class="name">500</span>14B8A6</div>
    <div class="sw" style="background:var(--teal-600);outline:2px solid var(--fg-1);outline-offset:2px"><span class="name">600 · primary</span>0F766E</div>
    <div class="sw" style="background:var(--teal-700)"><span class="name">700</span>115E59</div>
    <div class="sw" style="background:var(--teal-800)"><span class="name">800</span>134E4A</div>
    <div class="sw" style="background:var(--teal-900)"><span class="name">900</span>0B3F3C</div>
  </div>
</body></html>

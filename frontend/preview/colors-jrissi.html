<!doctype html>
<!-- @dsCard group="Brand" name="JRISSI risk scale" subtitle="Mental-health 0–33 / 34–66 / 67–100" viewport="700x210" -->
<html><head><meta charset="utf-8"><title>JRISSI risk scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 16px; background: var(--surface-1); }
  .scale { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0; border-radius: 10px; overflow: hidden; border: 1px solid var(--border-1); }
  .seg { padding: 16px 14px; color: #fff; }
  .seg .label { font: 600 11px var(--font-sans); letter-spacing: .06em; text-transform: uppercase; opacity: .9; }
  .seg .range { font: 500 22px var(--font-mono); margin-top: 4px; }
  .seg .desc  { font: 400 12px var(--font-sans); opacity: .9; margin-top: 6px; line-height: 1.35; }
  .head { font: 600 12px var(--font-sans); color: var(--fg-3); letter-spacing: .06em; text-transform: uppercase; margin: 0 0 10px; }
  .sub { font: 400 11px var(--font-sans); color: var(--fg-3); margin-top: 8px; }
</style></head>
<body>
  <p class="head">JRISSI · mental-health risk scale (doctor-only)</p>
  <div class="scale">
    <div class="seg" style="background:var(--risk-low)">
      <div class="label">Low</div>
      <div class="range">0–33</div>
      <div class="desc">Routine monitoring</div>
    </div>
    <div class="seg" style="background:var(--risk-moderate)">
      <div class="label">Moderate</div>
      <div class="range">34–66</div>
      <div class="desc">Suggest check-in</div>
    </div>
    <div class="seg" style="background:var(--risk-high)">
      <div class="label">High</div>
      <div class="range">67–100</div>
      <div class="desc">Escalate · 14-day rule</div>
    </div>
  </div>
  <p class="sub">Named distinctly (<code style="font:500 11px var(--font-mono);color:var(--fg-2)">--risk-low/moderate/high</code>) so the scale can carry icons or patterns in addition to colour for accessibility.</p>
</body></html>

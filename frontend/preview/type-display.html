<!doctype html>

<html><head><meta charset="utf-8"><title>Type — display & headings</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px 20px; background: var(--surface-1); }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 6px 0; border-bottom: 1px dashed var(--border-1); }
  .row:last-child { border: 0; }
  .tag { font: 500 11px var(--font-mono); color: var(--fg-3); flex: 0 0 84px; }
</style></head>
<body>
  <div class="row"><span class="tag">display-l 48/700</span><span class="type-display-l">Predict. Prevent.</span></div>
  <div class="row"><span class="tag">display-m 36/600</span><span class="type-display-m">Patient overview</span></div>
  <div class="row"><span class="tag">h1 30/600</span><span class="type-h1">Mental health risk</span></div>
  <div class="row"><span class="tag">h2 24/600</span><span class="type-h2">Pharmacy inventory</span></div>
  <div class="row"><span class="tag">h3 20/600</span><span class="type-h3">Upcoming consultations</span></div>
  <div class="row"><span class="tag">h4 16/600</span><span class="type-h4">Vital signs</span></div>
</body></html>

<!doctype html>
<!-- @dsCard group="Brand" name="Spacing scale" subtitle="4 px base · 1–16 increments" viewport="700x280" -->
<html><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 18px 20px; background: var(--surface-1); }
  .row { display: flex; align-items: center; gap: 16px; padding: 4px 0; }
  .bar { background: var(--teal-200); height: 14px; border-radius: 3px; }
  .name { font: 500 11px var(--font-mono); color: var(--fg-3); width: 72px; }
  .px { font: 500 11px var(--font-mono); color: var(--fg-2); width: 48px; text-align: right; }
</style></head>
<body>
  <div class="row"><span class="name">--space-1</span><span class="bar" style="width:4px"></span><span class="px">4 px</span></div>
  <div class="row"><span class="name">--space-2</span><span class="bar" style="width:8px"></span><span class="px">8 px</span></div>
  <div class="row"><span class="name">--space-3</span><span class="bar" style="width:12px"></span><span class="px">12 px</span></div>
  <div class="row"><span class="name">--space-4</span><span class="bar" style="width:16px"></span><span class="px">16 px</span></div>
  <div class="row"><span class="name">--space-5</span><span class="bar" style="width:20px"></span><span class="px">20 px</span></div>
  <div class="row"><span class="name">--space-6</span><span class="bar" style="width:24px"></span><span class="px">24 px</span></div>
  <div class="row"><span class="name">--space-8</span><span class="bar" style="width:32px"></span><span class="px">32 px</span></div>
  <div class="row"><span class="name">--space-10</span><span class="bar" style="width:40px"></span><span class="px">40 px</span></div>
  <div class="row"><span class="name">--space-12</span><span class="bar" style="width:48px"></span><span class="px">48 px</span></div>
  <div class="row"><span class="name">--space-16</span><span class="bar" style="width:64px"></span><span class="px">64 px</span></div>
</body></html>

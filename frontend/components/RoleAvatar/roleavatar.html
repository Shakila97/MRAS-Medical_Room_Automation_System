<!doctype html>
<!-- @dsCard group="Components" name="RoleAvatar" subtitle="Accent-coloured by role" viewport="560x180" -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>RoleAvatar</title>
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <style>
    body { margin: 0; padding: 24px; background: var(--surface-1); }
    .row { display: flex; gap: 28px; align-items: center; justify-content: center; }
    .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .cap { font: 500 12px var(--font-sans); color: var(--fg-3); }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
</head>
<body>
  <div id="root"></div>
  <script>
    const { RoleAvatar } = window.MRASDesignSystem_019e16;
    const h = React.createElement;
    const Cell = (role, name) => h('div', { className: 'cell' },
      h(RoleAvatar, { name, role, size: 56 }),
      h('span', { className: 'cap' }, role[0].toUpperCase() + role.slice(1)));
    ReactDOM.createRoot(document.getElementById('root')).render(
      h('div', { className: 'row' },
        Cell('doctor', 'P. Withana'),
        Cell('employee', 'S. Nawarathna'),
        Cell('pharmacy', 'L. Koralage'),
        Cell('admin', 'D. Anuradha'),
      )
    );
  </script>
</body>
</html>

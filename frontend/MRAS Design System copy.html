<!doctype html>
<!-- @dsCard group="Brand" name="MRAS Design System" subtitle="Comprehensive design system + UI kit · foundations, components, screens, dark mode" -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>MRAS Design System &amp; UI Kit</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="ext-resource-dependency" content="assets/mras-wordmark.svg" data-resource-id="mrasWordmark" />
  <meta name="ext-resource-dependency" content="assets/mras-mark.svg" data-resource-id="mrasMark" />
  <link rel="stylesheet" href="src/tokens.css" />
  <style>
    html, body, #root { height: 100%; margin: 0; }
    body { background: var(--bg-canvas); color: var(--fg-1); font-family: var(--font-sans); }
    a { color: var(--primary); }
    /* Hide native scrollbars inside artboards for cleaner look */
    .ms { font-feature-settings: 'liga'; }
  </style>
</head>
<body>
  <div id="root"></div>

  <template id="__bundler_thumbnail" data-bg-color="#0B3F3C">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#0B3F3C"/>
      <circle cx="600" cy="340" r="150" fill="none" stroke="#2DD4BF" stroke-width="20"/>
      <path d="M600 250 v90 l64 64" fill="none" stroke="#5EEAD4" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="600" y="560" text-anchor="middle" fill="#F0FDFA" font-family="system-ui, sans-serif" font-size="90" font-weight="700" letter-spacing="6">MRAS</text>
      <text x="600" y="630" text-anchor="middle" fill="#5EEAD4" font-family="ui-monospace, monospace" font-size="30" letter-spacing="8">DESIGN SYSTEM</text>
    </svg>
  </template>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Design Canvas + Tweaks shell -->
  <script type="text/babel" data-presets="react" src="src/design-canvas.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/tweaks-panel.jsx"></script>

  <!-- Primitives -->
  <script type="text/babel" data-presets="react" src="src/widgets.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/primitives.jsx"></script>

  <!-- Foundations + components (showcases) -->
  <script type="text/babel" data-presets="react" src="src/foundations.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/components.jsx"></script>

  <!-- Chrome (AppBar / Sidebar) + ScreenFrame -->
  <script type="text/babel" data-presets="react" src="src/Chrome.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/ScreenFrame.jsx"></script>

  <!-- Existing screens (from MRAS DS) -->
  <script type="text/babel" data-presets="react" src="src/screens/DoctorDashboard.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/screens/PatientRecord.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/screens/EmployeeHome.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/screens/PharmacyDashboard.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/screens/PharmacyInventory.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/screens/AdminDashboard.jsx"></script>

  <!-- New screens -->
  <script type="text/babel" data-presets="react" src="src/screens/DoctorScreens.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/screens/PharmacyScreens.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/screens/EmployeeScreens.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/screens/AdminScreens.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/screens/SharedScreens.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/screens/AuthScreens.jsx"></script>

  <!-- App -->
  <script type="text/babel" data-presets="react" src="src/App.jsx"></script>
</body>
</html>

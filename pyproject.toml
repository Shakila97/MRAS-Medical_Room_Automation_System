[tool.ruff]
target-version = "py312"
line-length = 100
select = ["E", "F", "W", "I", "N", "UP", "ANN", "S", "B", "A", "C4", "SIM"]
ignore = ["ANN101", "ANN102", "S101"]

[tool.ruff.per-file-ignores]
"tests/*" = ["ANN", "S"]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true
exclude = ["alembic/", "scripts/"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-v --tb=short"

[tool.coverage.run]
source = ["src"]
omit = ["src/main.py"]

[tool.ruff]

[tool.ruff.lint]
select = ["E", "F"]
ignore = ["E501", "F401", "F811"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["F401", "F811", "E402"]
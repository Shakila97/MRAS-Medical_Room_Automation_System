name: CI — Lint, Test & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Ruff + Mypy + Pytest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: mras
          POSTGRES_PASSWORD: mras
          POSTGRES_DB: mras_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (Ruff)
        run: ruff check src/

      - name: Type check (Mypy)
        run: mypy src/

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://mras:mras@localhost:5432/mras_test
          SECRET_KEY: ci-test-secret
        run: pytest --cov=src --cov-report=term-missing -v

  docker:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t mras-v3:ci .
